<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading - Sharkings Interior</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --navy:#071426;
    --royal:#10294d;
    --blue:#1f5eff;
    --gold:#d4af72;
    --white:#ffffff;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:'Jost',sans-serif;
    background:
        radial-gradient(circle at top left,#1f5eff22,transparent 30%),
        radial-gradient(circle at bottom right,#d4af7222,transparent 30%),
        linear-gradient(135deg,#071426,#10294d);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Background Glow */
.bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    background:linear-gradient(45deg,#1f5eff55,#d4af7255);
    filter:blur(120px);
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px) scale(1);
    }
    50%{
        transform:translateY(-20px) scale(1.05);
    }
}

/* Main Loader Box */
.loader-container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:50px;
    width:380px;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.4),
        inset 0 0 20px rgba(255,255,255,0.03);
}

/* Logo */
.logo{
    width:95px;
    height:95px;
    margin:auto;
    margin-bottom:25px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid var(--gold);
    box-shadow:0 0 25px rgba(212,175,114,0.5);
    animation:pulse 2.5s infinite;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 15px rgba(212,175,114,0.4);
    }
    50%{
        transform:scale(1.06);
        box-shadow:0 0 35px rgba(212,175,114,0.8);
    }
    100%{
        transform:scale(1);
        box-shadow:0 0 15px rgba(212,175,114,0.4);
    }
}

/* Brand */
.brand{
    font-family:'Playfair Display',serif;
    font-size:2rem;
    color:var(--white);
    letter-spacing:1px;
    margin-bottom:10px;
}

.tagline{
    color:#d8e4ff;
    font-size:0.95rem;
    margin-bottom:35px;
    opacity:0.8;
}

/* Loader Animation */
.loader{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.08);
    border-radius:50px;
    overflow:hidden;
    position:relative;
}

.loader::before{
    content:'';
    position:absolute;
    left:-40%;
    top:0;
    width:40%;
    height:100%;
    border-radius:50px;
    background:linear-gradient(90deg,var(--gold),#fff,var(--blue));
    animation:loading 1.8s infinite;
}

@keyframes loading{
    0%{
        left:-40%;
    }
    100%{
        left:100%;
    }
}

.loading-text{
    margin-top:18px;
    color:#ffffffcc;
    letter-spacing:3px;
    font-size:0.85rem;
    text-transform:uppercase;
    animation:blink 1.4s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:0.4;
    }
    50%{
        opacity:1;
    }
}

/* Small Floating Dots */
.dots span{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:move 8s linear infinite;
}

.dots span:nth-child(1){
    top:10%;
    left:20%;
}

.dots span:nth-child(2){
    top:80%;
    left:70%;
    animation-delay:2s;
}

.dots span:nth-child(3){
    top:30%;
    left:85%;
    animation-delay:4s;
}

@keyframes move{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
    100%{
        transform:translateY(0px);
    }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="dots">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="loader-container">

    <!-- Replace logo.png with your actual logo -->
    <div class="logo">
        <img src="C:\Users\shame\Downloads\slogo.webp" alt="Logo">
    </div>

    <h1 class="brand">Sharkings Interior</h1>

    <p class="tagline">
        Luxury • Elegance • Innovation
    </p>

    <div class="loader"></div>

    <div class="loading-text">
        Loading Experience...
    </div>

</div>

<script>
/* Auto Redirect */
setTimeout(() => {
    window.location.href = "index.html";
}, 3500);
</script>

</body>
</html>
